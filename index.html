<script>
// ============ AUDIO ENGINE ============
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx;
function initAudio() {
  if (!actx) actx = new AudioCtx();
  if (actx.state === 'suspended') actx.resume();
}
function playClick() {
  if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'square'; o.frequency.value = 800;
  g.gain.setValueAtTime(0.15, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.08);
  o.connect(g).connect(actx.destination); o.start(); o.stop(actx.currentTime + 0.08);
}
function playCashSound() {
  if (!actx) return;
  [523,659,784].forEach((f,i) => {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'square'; o.frequency.value = f;
    g.gain.setValueAtTime(0.12, actx.currentTime + i*0.08);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + i*0.08 + 0.15);
    o.connect(g).connect(actx.destination);
    o.start(actx.currentTime + i*0.08); o.stop(actx.currentTime + i*0.08 + 0.15);
  });
}
function playSwitchSound() {
  if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(200, actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(600, actx.currentTime + 0.1);
  g.gain.setValueAtTime(0.15, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.15);
  o.connect(g).connect(actx.destination); o.start(); o.stop(actx.currentTime + 0.15);
}
function playImpactSound(isNuclear=false) {
  if (!actx) return;
  const duration = isNuclear ? 6.8 : 3.8;
  const bufSize = Math.floor(actx.sampleRate * duration);
  const buf = actx.createBuffer(2, bufSize, actx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < bufSize; i++) {
      const t = i / actx.sampleRate;
      const fade = Math.max(0, 1 - t / duration);
      const low = Math.sin(t * (isNuclear ? 28 : 40)) * (isNuclear ? 0.8 : 0.45);
      const noise = (Math.random() * 2 - 1) * (isNuclear ? 0.95 : 0.7);
      d[i] = (low + noise) * fade * (isNuclear ? 0.95 : 0.75);
    }
  }
  const src = actx.createBufferSource(); src.buffer = buf;
  const lp = actx.createBiquadFilter(); lp.type = 'lowpass';
  lp.frequency.setValueAtTime(isNuclear ? 140 : 220, actx.currentTime);
  lp.frequency.exponentialRampToValueAtTime(isNuclear ? 45 : 80, actx.currentTime + duration * 0.8);
  const g = actx.createGain();
  g.gain.setValueAtTime(isNuclear ? 1.0 : 0.75, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + duration);
  src.connect(lp).connect(g).connect(actx.destination); src.start();
  const siren = actx.createOscillator(), sg = actx.createGain();
  siren.type = 'sawtooth';
  siren.frequency.setValueAtTime(isNuclear ? 70 : 120, actx.currentTime);
  siren.frequency.exponentialRampToValueAtTime(isNuclear ? 2800 : 1800, actx.currentTime + (isNuclear ? 2.2 : 1.5));
  siren.frequency.exponentialRampToValueAtTime(isNuclear ? 40 : 60, actx.currentTime + duration - 0.5);
  sg.gain.setValueAtTime(isNuclear ? 0.45 : 0.28, actx.currentTime);
  sg.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + duration);
  siren.connect(sg).connect(actx.destination); siren.start(); siren.stop(actx.currentTime + duration);
  const expBuf = actx.createBuffer(1, Math.floor(actx.sampleRate * (isNuclear ? 1.2 : 0.45)), actx.sampleRate);
  const ed = expBuf.getChannelData(0);
  for (let i = 0; i < ed.length; i++) ed[i] = (Math.random() * 2 - 1) * Math.exp(-i / (actx.sampleRate * (isNuclear ? 0.18 : 0.08)));
  const expSrc = actx.createBufferSource(); expSrc.buffer = expBuf;
  const eg = actx.createGain();
  eg.gain.setValueAtTime(isNuclear ? 1.2 : 0.9, actx.currentTime + (isNuclear ? 1.0 : 0.8));
  eg.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + (isNuclear ? 2.5 : 1.2));
  expSrc.connect(eg).connect(actx.destination); expSrc.start(actx.currentTime + (isNuclear ? 1.0 : 0.8));
}

// ============ TARGETS ============
const targets = [
  { name: "El Pentágono",      icon: "⭐", type: "edificio" },

];

let state = {
  mode: 'money', amount: 1, currentTarget: 0,
  totalMoney: 0, totalBombs: 0, tvStatic: 0,
  shakeX: 0, shakeY: 0, trumpAnim: 0, launched: false,
  moneyParticles: [], decisions: [],
  strikeActive: false, strikeTime: 0, skyRed: 0, strikeType: 'bomb',
  time: 0, dustMotes: [],
};
for (let i = 0; i < 30; i++) {
  state.dustMotes.push({ x: Math.random(), y: Math.random(), s: 1 + Math.random() * 2, speed: 0.0001 + Math.random() * 0.0003, drift: Math.random() * Math.PI * 2 });
}

function shuffleTargets() {
  for (let i = targets.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [targets[i], targets[j]] = [targets[j], targets[i]];
  }
}
shuffleTargets();

// ============ CANVAS ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

function drawPixelRect(x, y, w, h, color) { ctx.fillStyle = color; ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h)); }
function drawPixelText(text, x, y, size, color, align='center') {
  ctx.save(); ctx.font = `${size}px 'Press Start 2P', monospace`; ctx.fillStyle = color; ctx.textAlign = align; ctx.textBaseline = 'middle'; ctx.fillText(text, x, y); ctx.restore();
}

function getWin(w, h) {
  const cx = w * 0.78, cy = h * 0.2;
  const ww = w * 0.14, wh = h * 0.22;
  return { cx, cy, ww, wh, l: cx-ww/2, t: cy-wh/2, r: cx+ww/2, b: cy+wh/2 };
}

// ============ ENHANCED ROOM ============
function drawRoom(w, h) {
  const floorY = h * 0.62;
  // Wall with wallpaper
  const wallGrad = ctx.createLinearGradient(0, 0, 0, floorY);
  wallGrad.addColorStop(0, '#141428'); wallGrad.addColorStop(0.5, '#1a1a32'); wallGrad.addColorStop(1, '#16213e');
  ctx.fillStyle = wallGrad; ctx.fillRect(0, 0, w, floorY);
  // Wallpaper diamond pattern
  ctx.globalAlpha = 0.04;
  for (let gy = 0; gy < floorY; gy += 28) for (let gx = 0; gx < w; gx += 28) {
    const off = (Math.floor(gy / 28) % 2) * 14;
    ctx.fillStyle = '#c8a432'; ctx.beginPath();
    ctx.moveTo(gx + off, gy + 14); ctx.lineTo(gx + off + 7, gy); ctx.lineTo(gx + off + 14, gy + 14); ctx.lineTo(gx + off + 7, gy + 28); ctx.closePath(); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // Crown molding
  drawPixelRect(0, 0, w, 5, '#c8a432'); drawPixelRect(0, 5, w, 3, '#a08020'); drawPixelRect(0, 8, w, 2, '#806018');
  // Wainscoting
  const panelTop = floorY - h * 0.18;
  drawPixelRect(0, panelTop, w, 4, '#c8a432');
  drawPixelRect(0, panelTop + 4, w, floorY - panelTop - 4, '#0f1a30');
  const panelCount = Math.floor(w / 120);
  for (let i = 0; i < panelCount; i++) { const px = i * (w / panelCount) + 10; const pw = (w / panelCount) - 20; ctx.strokeStyle = 'rgba(200,164,50,0.12)'; ctx.lineWidth = 2; ctx.strokeRect(px, panelTop + 12, pw, floorY - panelTop - 24); }
  // Baseboard
  drawPixelRect(0, floorY - 8, w, 8, '#0f3460'); drawPixelRect(0, floorY - 10, w, 3, '#c8a432');
  // Floor parquet
  drawPixelRect(0, floorY, w, h - floorY, '#2a1a0e');
  const tileW = w / 12, tileH = 40;
  for (let j = 0; j < Math.ceil((h - floorY) / tileH) + 1; j++) for (let i = 0; i < 14; i++) {
    const offX = (j % 2) * (tileW / 2); const tx = i * tileW - offX; const ty = floorY + j * tileH;
    const shade = (i + j) % 3 === 0 ? '#2e1e10' : (i + j) % 3 === 1 ? '#3a2818' : '#24180a';
    drawPixelRect(tx, ty, tileW - 1, tileH - 1, shade);
    ctx.globalAlpha = 0.08; for (let g2 = 0; g2 < 3; g2++) drawPixelRect(tx + 3 + g2 * (tileW / 4), ty + 2, 1, tileH - 4, '#c8a060'); ctx.globalAlpha = 1;
  }
  // Floor shine
  ctx.globalAlpha = 0.04; const floorShine = ctx.createLinearGradient(0, floorY, 0, h); floorShine.addColorStop(0, '#ffffff'); floorShine.addColorStop(0.3, 'transparent'); ctx.fillStyle = floorShine; ctx.fillRect(0, floorY, w, h - floorY); ctx.globalAlpha = 1;
  // Carpet
  const carpetL = w * 0.28, carpetR = w * 0.72, carpetY = floorY + 2;
  ctx.fillStyle = '#1a0a2e'; ctx.fillRect(carpetL, carpetY, carpetR - carpetL, h * 0.25);
  ctx.strokeStyle = '#c8a432'; ctx.lineWidth = 2; ctx.strokeRect(carpetL + 4, carpetY + 4, carpetR - carpetL - 8, h * 0.25 - 8); ctx.strokeRect(carpetL + 8, carpetY + 8, carpetR - carpetL - 16, h * 0.25 - 16);
  ctx.globalAlpha = 0.06; for (let cy2 = carpetY + 14; cy2 < carpetY + h * 0.25 - 14; cy2 += 16) for (let cx2 = carpetL + 14; cx2 < carpetR - 14; cx2 += 16) { ctx.fillStyle = '#c8a432'; ctx.fillRect(cx2, cy2, 4, 4); } ctx.globalAlpha = 1;
  // Curtains
  drawCurtain(w * 0.02, 10, w * 0.11, floorY - 10);
  drawCurtain(w * 0.87, 10, w * 0.11, floorY - 10);
  // Chandelier
  drawChandelier(w * 0.5, 0, w);
  // Dust motes
  drawDustMotes(w, floorY);
}

function drawChandelier(cx, topY, roomW) {
  const swing = Math.sin(state.time * 0.3) * 1.5; const chainLen = 35;

// ============ PARTICLES ============
function updateParticles() {
  state.moneyParticles = state.moneyParticles.filter(p => p.life > 0);
  state.moneyParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.rotation = (p.rotation||0) + p.rotSpeed; p.life -= 0.015;
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotation); ctx.globalAlpha = Math.min(1, p.life*2);
    ctx.font = `${p.size}px 'Press Start 2P', monospace`; ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},1)`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(p.text, 0, 0);
    ctx.restore(); ctx.globalAlpha = 1;
  });
}

// ============ GAME LOGIC ============
function startStrike(type) {
  state.strikeType=type;state.strikeActive=true;state.strikeTime=0;playImpactSound(type==='nuclear');
  if(navigator.vibrate){if(type==='nuclear')navigator.vibrate([300,60,300,60,700,120,1200,150,700,100,900]);else navigator.vibrate([200,50,200,50,500,100,1000]);}
}

  state.currentTarget++;state.amount=state.mode==='money'?1:'bomb';state.tvStatic=1;state.launched=false;updateUI();updateTargetCounter();
  if(state.currentTarget>=targets.length) showEndScreen();
}
function launch() {
  if(state.launched)return;state.launched=true;state.trumpAnim=1;
  const t=targets[state.currentTarget%targets.length];
  state.decisions.push({target:t.name,mode:state.mode,amount:state.amount,icon:t.icon});
  if(state.mode==='money'){state.totalMoney+=state.amount;playCashSound();spawnMoneyParticles(canvas.width*0.5,canvas.height*0.25);document.getElementById('total-money').textContent=state.totalMoney;setTimeout(()=>nextTarget(),1500);}
  else{state.totalBombs+=(state.amount==='nuclear'?10:1);document.getElementById('total-bombs').textContent=state.totalBombs;startStrike(state.amount);}
}
function toggleMode(){state.mode=state.mode==='money'?'bombs':'money';state.amount=state.mode==='money'?1:'bomb';playSwitchSound();updateUI();}

  if(state.strikeActive){
    const isNuclear=state.strikeType==='nuclear';
    if(state.strikeTime>=(isNuclear?1.8:1.2)&&state.strikeTime<(isNuclear?2.45:1.7)){const fp=state.strikeTime<(isNuclear?2.25:1.5)?1:1-(state.strikeTime-(isNuclear?2.25:1.5))/(isNuclear?0.2:0.2);ctx.fillStyle=`rgba(255,240,200,${fp*(isNuclear?0.55:0.35)})`;ctx.fillRect(0,0,w,h);}
    if(state.strikeTime>=(isNuclear?2.25:1.5)){const win=getWin(w,h);const intensity=isNuclear?(state.strikeTime<5.5?0.32:Math.max(0,0.32*(1-(state.strikeTime-5.5)/2.0))):(state.strikeTime<3.0?0.18:Math.max(0,0.18*(1-(state.strikeTime-3.0)/1.8)));const ag=ctx.createRadialGradient(win.cx,win.cy,0,win.cx,win.cy,w*(isNuclear?0.8:0.5));ag.addColorStop(0,`rgba(255,50,0,${intensity})`);ag.addColorStop(1,'rgba(255,20,0,0)');ctx.fillStyle=ag;ctx.fillRect(0,0,w,h);}
  }
  // Vignette
  ctx.globalAlpha=0.3;const sceneVig=ctx.createRadialGradient(w/2,h/2,w*0.25,w/2,h/2,w*0.7);sceneVig.addColorStop(0,'transparent');sceneVig.addColorStop(1,'#000000');ctx.fillStyle=sceneVig;ctx.fillRect(0,0,w,h);ctx.globalAlpha=1;
  ctx.restore();requestAnimationFrame(render);
}

// ============ EVENTS ============
document.getElementById('intro-screen').addEventListener('click',()=>{initAudio();cancelAnimationFrame(introRAF);document.getElementById('intro-screen').style.display='none';document.getElementById('ui-overlay').style.display='flex';state.tvStatic=1;updateTargetCounter();requestAnimationFrame(render);});
document.getElementById('btn-switch').addEventListener('click',()=>{initAudio();toggleMode();});
document.getElementById('btn-amount').addEventListener('click',()=>{initAudio();increaseAmount();});
document.getElementById('btn-launch').addEventListener('click',()=>{initAudio();launch();});

// Share buttons
document.getElementById('share-wa').addEventListener('click',()=>{window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(getShareText())}`,'_blank');});
document.getElementById('share-tw').addEventListener('click',()=>{window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(getShareText())}`,'_blank');});
document.getElementById('share-tg').addEventListener('click',()=>{window.open(`https://t.me/share/url?url=${encodeURIComponent('https://pablodev-star.github.io/DonaldBoom/')}&text=${encodeURIComponent(getShareText())}`,'_blank');});
document.getElementById('share-copy').addEventListener('click',()=>{
  const text=getShareText();
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('share-copy');btn.classList.add('copied');btn.innerHTML='<span class="share-icon">✅</span> Copiado!';
    setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='<span class="share-icon">📋</span> Copiar';},2000);
  }).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    const btn=document.getElementById('share-copy');btn.classList.add('copied');btn.innerHTML='<span class="share-icon">✅</span> Copiado!';
    setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='<span class="share-icon">📋</span> Copiar';},2000);
  });
});
document.getElementById('btn-replay').addEventListener('click',()=>{initAudio();playClick();resetGame();});

document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('dblclick',e=>e.preventDefault());
</script>
